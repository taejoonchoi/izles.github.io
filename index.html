<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IZLES</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Pretendard:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Pretendard', sans-serif;
      opacity: 0;
      transition: 0.8s;
    }

    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      letter-spacing: 4px;
    }

    .logo a,
    .menu a {
      color: #fff;
      text-decoration: none;
    }

    .menu a {
      margin-left: 20px;
      opacity: 0.7;
      transition: 0.3s;
    }

    .menu a:hover {
      opacity: 1;
    }

    #progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: white;
      width: 0%;
      z-index: 9999;
    }

    #light {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent);
      pointer-events: none;
      top: 0;
      left: 0;
      transform: translate(-50%, -50%);
      z-index: 9998;
    }

    .cursor {
      width: 20px;
      height: 20px;
      border: 1px solid white;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }

    .cursor.click {
      transform: translate(-50%, -50%) scale(2);
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    #loader h1 {
      font-size: 2rem;
      letter-spacing: 5px;
      font-family: 'Playfair Display', serif;
    }

    .hero {
      height: 100vh;
      background: url('img1.jpg') center/cover no-repeat;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      padding: 0 20px;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 0;
    }

    .hero h1,
    .hero p,
    .hero .hero-buttons {
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      font-size: 4rem;
      font-family: 'Playfair Display', serif;
      letter-spacing: 4px;
      margin-bottom: 14px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease forwards;
    }

    .hero p {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.4s;
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .hero-buttons {
      margin-top: 30px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.7s;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      border: 1px solid #fff;
      color: #fff;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      letter-spacing: 1px;
      transition: 0.3s;
      background: transparent;
      margin: 0 6px;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 0%;
      height: 100%;
      background: white;
      transition: 0.3s;
      z-index: -1;
    }

    .btn:hover::after {
      width: 100%;
    }

    .btn:hover {
      color: #000;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(255,255,255,0.15);
    }

    .intro {
      max-width: 900px;
      margin: 0 auto;
      padding: 120px 20px;
      text-align: center;
    }

    .intro h2 {
      font-size: 2rem;
      letter-spacing: 3px;
      margin-bottom: 24px;
    }

    .intro p {
      max-width: 680px;
      margin: 0 auto;
      line-height: 1.9;
      opacity: 0.85;
    }

    footer {
      text-align: center;
      padding: 50px 20px;
      opacity: 0.45;
      font-size: 0.95rem;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .nav {
        padding: 16px 20px;
      }

      .menu a {
        margin-left: 12px;
        font-size: 0.9rem;
      }

      .hero h1 {
        font-size: 2.4rem;
      }

      .btn {
        display: block;
        margin: 10px auto;
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <div id="loader">
    <h1>IZLES</h1>
  </div>

  <div id="progress"></div>
  <div id="light"></div>
  <div class="cursor"></div>

  <nav class="nav">
    <div class="logo"><a href="index.html">IZLES</a></div>
    <div class="menu">
      <a href="index.html" style="opacity:1;">Home</a>
      <a href="about.html">About</a>
      <a href="lookbook.html">Lookbook</a>
    </div>
  </nav>

  <section class="hero">
    <h1 id="typing"></h1>
    <p>감각을 입다</p>
    <p>by 최태준</p>

    <div class="hero-buttons">
      <a href="about.html" class="btn">About 보기</a>
      <a href="lookbook.html" class="btn">Lookbook 보기</a>
    </div>
  </section>

  <section class="intro">
    <h2>Welcome to IZLES</h2>
    <p>
      IZLES는 다양한 스타일과 분위기를 통해 각자의 취향을 발견하도록 돕는 공간이다.
      단순한 의류 소개를 넘어서, 나만의 시선으로 패션을 기록하고 공유하며
      더 나은 선택과 소비로 이어질 수 있는 감각적인 플랫폼을 만들어가고 있다.
    </p>
  </section>

  <footer>
    © 2026 IZLES. All rights reserved.
  </footer>

  <script>
    const cursor = document.querySelector('.cursor');
    const light = document.getElementById('light');

    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      light.style.left = e.clientX + 'px';
      light.style.top = e.clientY + 'px';
    });

    document.addEventListener('click', () => {
      cursor.classList.add('click');
      setTimeout(() => {
        cursor.classList.remove('click');
      }, 200);
    });

    window.addEventListener('scroll', () => {
      let scroll = window.scrollY;
      let height = document.body.scrollHeight - window.innerHeight;
      let percent = (scroll / height) * 100;
      document.getElementById('progress').style.width = percent + '%';
    });

    window.addEventListener('load', () => {
      document.getElementById('loader').style.display = 'none';
      document.body.style.opacity = 1;
    });

    const text = "IZLES - Discover Your Taste";
    let index = 0;

    function typing() {
      if (index < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(index);
        index++;
        setTimeout(typing, 80);
      }
    }
    typing();
  </script>
</body>
</html>
